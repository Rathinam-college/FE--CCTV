server {
    listen 80;
    server_name localhost;

    location /cctv/ {
        alias /usr/share/nginx/html/cctv/;
        index index.html;
        try_files $uri $uri/ /cctv/index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
